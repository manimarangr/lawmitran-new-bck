# ── /storage → MinIO bucket (HOST nginx reference) ───────────────────────────
# Paste this location block into the TLS server{} that serves dev.lawmitran.com
# (the host nginx terminating HTTPS), then: nginx -t && systemctl reload nginx.
# The compose nginx already has the equivalent (proxy_pass to the "minio"
# service); this variant targets MinIO's published port on the host instead.
#
# Only public bucket prefixes (profiles/ offices/ avatars/) are anonymously
# readable; certificates/ and property/ return 403 from MinIO — no KYC leak.

location /storage/ {
    proxy_pass http://127.0.0.1:9000/lawmitran-documents/;
    proxy_set_header Host $host;
    proxy_hide_header x-amz-request-id;
    proxy_hide_header x-amz-id-2;
    client_max_body_size 0;
    proxy_intercept_errors off;
}

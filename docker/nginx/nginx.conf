server {
    listen 80;

    # Public object storage — proxy the MinIO bucket over the app origin so
    # profile/office/avatar images load same-origin over HTTPS. Only public
    # bucket prefixes (profiles/ offices/ avatars/) are anonymously readable;
    # certificates/ and property/ return 403 from MinIO, so this can't leak KYC.
    location /storage/ {
        proxy_pass http://minio:9000/lawmitran-documents/;
        proxy_set_header Host $host;
        proxy_hide_header x-amz-request-id;
        proxy_hide_header x-amz-id-2;
        proxy_intercept_errors off;
    }

    location /api/ {
        proxy_pass http://backend:3001/api/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location / {
        proxy_pass http://frontend:3000/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}

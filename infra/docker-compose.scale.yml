# LawMitran — scale-oriented local/staging stack.
# Demonstrates the 10k-concurrent topology from docs/19-scalability.md:
#   nginx (LB)  →  api (xN, stateless)  →  pgbouncer  →  postgres
#                                       →  redis (cache / rate-limit / OTP)
#                                       →  minio (S3-compatible object storage)
#
# Scale the API horizontally:   docker compose -f infra/docker-compose.scale.yml up -d --scale api=4
#
# NOTE: values here are dev/staging defaults. In production use managed services
# (RDS + read replicas, ElastiCache, S3, ALB) and real secrets.

services:
  # ---------- Reverse proxy / load balancer ----------
  nginx:
    image: nginx:1.27-alpine
    depends_on: [api]
    ports:
      - "8080:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    restart: unless-stopped

  # ---------- NestJS API (stateless, scale with --scale api=N) ----------
  api:
    build:
      context: ../backend
      dockerfile: Dockerfile
    # no host port — nginx load-balances across replicas via the service DNS name
    expose:
      - "3001"
    environment:
      NODE_ENV: production
      PORT: "3001"
      # Point Prisma at PgBouncer, NOT postgres directly. Keep the per-instance
      # pool small — PgBouncer multiplexes to the real DB.
      DATABASE_URL: "postgresql://lawmitran:lawmitran@pgbouncer:6432/lawmitran?pgbouncer=true&connection_limit=5"
      REDIS_URL: "redis://redis:6379"
      JWT_ACCESS_SECRET: "dev_access_secret_change_me"
      JWT_REFRESH_SECRET: "dev_refresh_secret_change_me"
      S3_ENDPOINT: "http://minio:9000"
      S3_ACCESS_KEY: "minioadmin"
      S3_SECRET_KEY: "minioadmin"
      S3_BUCKET: "lawmitran"
      S3_FORCE_PATH_STYLE: "true"
    depends_on:
      pgbouncer: { condition: service_started }
      redis: { condition: service_started }
      minio: { condition: service_started }
    restart: unless-stopped
    deploy:
      resources:
        limits: { cpus: "2", memory: 1g }

  # ---------- BullMQ workers (async: notifications, lead routing, OTP, PDF) ----------
  worker:
    build:
      context: ../backend
      dockerfile: Dockerfile
    command: ["node", "dist/worker.js"]   # adjust to your worker entrypoint
    environment:
      NODE_ENV: production
      DATABASE_URL: "postgresql://lawmitran:lawmitran@pgbouncer:6432/lawmitran?pgbouncer=true&connection_limit=5"
      REDIS_URL: "redis://redis:6379"
    depends_on:
      pgbouncer: { condition: service_started }
      redis: { condition: service_started }
    restart: unless-stopped

  # ---------- PgBouncer connection pooler (critical for many API instances) ----------
  pgbouncer:
    image: edoburu/pgbouncer:latest
    environment:
      DB_HOST: postgres
      DB_PORT: "5432"
      DB_USER: lawmitran
      DB_PASSWORD: lawmitran
      DB_NAME: lawmitran
      POOL_MODE: transaction
      MAX_CLIENT_CONN: "2000"
      DEFAULT_POOL_SIZE: "25"
    expose:
      - "6432"
    depends_on:
      postgres: { condition: service_healthy }
    restart: unless-stopped

  # ---------- PostgreSQL (primary; add replicas in prod) ----------
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: lawmitran
      POSTGRES_PASSWORD: lawmitran
      POSTGRES_DB: lawmitran
    command:
      - "postgres"
      - "-c"
      - "max_connections=200"
      - "-c"
      - "shared_buffers=512MB"
      - "-c"
      - "effective_cache_size=1536MB"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U lawmitran"]
      interval: 5s
      timeout: 3s
      retries: 10
    restart: unless-stopped

  # ---------- Redis (cache / rate-limit / OTP / queues) ----------
  redis:
    image: redis:7-alpine
    command: ["redis-server", "--maxmemory", "512mb", "--maxmemory-policy", "allkeys-lru"]
    expose:
      - "6379"
    restart: unless-stopped

  # ---------- MinIO (S3-compatible storage; use S3 + CDN in prod) ----------
  minio:
    image: minio/minio:latest
    command: ["server", "/data", "--console-address", ":9001"]
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - miniodata:/data
    restart: unless-stopped

volumes:
  pgdata:
  miniodata:

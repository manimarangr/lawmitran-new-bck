# NGINX as a simple load balancer in front of the (scaled) API service.
# Docker's embedded DNS resolves "api" to all replica IPs; nginx round-robins.
worker_processes auto;
events { worker_connections 4096; }

http {
  # Resolve the Docker service name dynamically so new replicas are picked up.
  resolver 127.0.0.11 valid=10s ipv6=off;

  upstream api_upstream {
    zone api_upstream 64k;
    server api:3001 resolve;
    keepalive 64;
  }

  # Lightweight edge cache for public GET pages (mirrors CDN/ISR behaviour).
  proxy_cache_path /tmp/nginx_cache levels=1:2 keys_zone=public:50m max_size=500m inactive=120s;

  # Basic rate limit at the edge (defence-in-depth alongside app @RateLimit).
  limit_req_zone $binary_remote_addr zone=perip:20m rate=50r/s;

  server {
    listen 80;

    # Health endpoint passthrough (used by orchestrator / LB).
    location = /health { proxy_pass http://api_upstream/health; }

    # Public, cacheable reads (search, profiles, document catalog).
    location ~ ^/api/(lawyers|documents)(/|$) {
      limit_req zone=perip burst=100 nodelay;
      proxy_cache public;
      proxy_cache_methods GET HEAD;
      proxy_cache_valid 200 60s;
      proxy_cache_key "$scheme$request_method$host$request_uri";
      add_header X-Cache-Status $upstream_cache_status;
      proxy_pass http://api_upstream;
      proxy_http_version 1.1;
      proxy_set_header Connection "";
      proxy_set_header Host $host;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # Everything else (auth, leads, payments) — no cache.
    location / {
      limit_req zone=perip burst=50 nodelay;
      proxy_pass http://api_upstream;
      proxy_http_version 1.1;
      proxy_set_header Connection "";
      proxy_set_header Host $host;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }
  }
}

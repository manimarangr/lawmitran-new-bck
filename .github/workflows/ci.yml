name: CI

on:
  pull_request:
    branches: [dev]

  push:
    branches: [dev]

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - name: Backend Build
        run: |
          cd backend
          npm ci
          npm run build

      - name: Frontend Build
        run: |
          cd frontend
          npm ci
          npm run build

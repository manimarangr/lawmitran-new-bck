<svg viewBox="0 0 1000 1120" xmlns="http://www.w3.org/2000/svg" font-family="'Segoe UI',Arial,sans-serif">
  <rect width="1000" height="1120" fill="#f5f7fb"/>
  <text x="500" y="54" text-anchor="middle" font-size="26" font-weight="800" fill="#0B192C">LawMitran — Logo Concepts</text>
  <text x="500" y="80" text-anchor="middle" font-size="13" fill="#64748b">Navy #0B192C · Gold #C9A24B · pick one and I'll wire it across the site</text>

  <!-- ============ A: Aegis (shield + scales monogram) ============ -->
  <g>
    <rect x="40" y="110" width="440" height="220" rx="16" fill="#fff" stroke="#e6e9f0"/>
    <text x="60" y="138" font-size="12" font-weight="700" fill="#C9A24B" letter-spacing="2">CONCEPT A · AEGIS</text>
    <!-- shield -->
    <g transform="translate(110,165)">
      <path d="M40 0 L80 14 V52 C80 78 62 96 40 108 C18 96 0 78 0 52 V14 Z" fill="#0B192C"/>
      <path d="M40 6 L74 18 V52 C74 74 58 90 40 100 C22 90 6 74 6 52 V18 Z" fill="none" stroke="#C9A24B" stroke-width="1.4" opacity=".6"/>
      <!-- scale beam -->
      <path d="M20 40 H60" stroke="#C9A24B" stroke-width="2.4" stroke-linecap="round"/>
      <path d="M40 30 V58" stroke="#C9A24B" stroke-width="2.4" stroke-linecap="round"/>
      <path d="M20 40 l-6 11 h12 z" fill="#C9A24B"/><path d="M60 40 l-6 11 h12 z" fill="#C9A24B"/>
      <rect x="30" y="58" width="20" height="3" rx="1.5" fill="#C9A24B"/>
    </g>
    <text x="220" y="232" font-size="34" font-weight="800" fill="#0B192C" letter-spacing="-1">Law<tspan fill="#C9A24B">Mitran</tspan></text>
    <text x="221" y="258" font-size="11" font-weight="700" letter-spacing="3" fill="#C9A24B">LEGAL HELP, SIMPLIFIED.</text>
    <!-- dark swatch -->
    <rect x="220" y="278" width="240" height="40" rx="8" fill="#0B192C"/>
    <text x="240" y="303" font-size="20" font-weight="800" fill="#fff">Law<tspan fill="#C9A24B">Mitran</tspan></text>
  </g>

  <!-- ============ B: Equilibrium (minimal scale + lowercase wordmark) ============ -->
  <g>
    <rect x="520" y="110" width="440" height="220" rx="16" fill="#fff" stroke="#e6e9f0"/>
    <text x="540" y="138" font-size="12" font-weight="700" fill="#C9A24B" letter-spacing="2">CONCEPT B · EQUILIBRIUM</text>
    <g transform="translate(560,168)">
      <circle cx="40" cy="50" r="46" fill="#0B192C"/>
      <path d="M22 44 H58" stroke="#fff" stroke-width="2.6" stroke-linecap="round"/>
      <path d="M40 30 V70" stroke="#fff" stroke-width="2.6" stroke-linecap="round"/>
      <circle cx="40" cy="28" r="3" fill="#C9A24B"/>
      <path d="M22 44 l-7 13 h14 z" fill="#C9A24B"/><path d="M58 44 l-7 13 h14 z" fill="#C9A24B"/>
      <path d="M15 57 a7 7 0 0014 0M51 57 a7 7 0 0014 0" stroke="#fff" stroke-width="1.5" fill="none"/>
      <rect x="30" y="70" width="20" height="3" rx="1.5" fill="#fff"/>
    </g>
    <text x="670" y="232" font-size="36" font-weight="700" fill="#0B192C" letter-spacing="-1.5">lawmitran<tspan fill="#C9A24B">.</tspan></text>
    <text x="672" y="256" font-size="11" font-weight="600" letter-spacing="2.5" fill="#64748b">VERIFIED LEGAL MARKETPLACE</text>
    <rect x="670" y="278" width="270" height="40" rx="8" fill="#0B192C"/>
    <text x="690" y="304" font-size="22" font-weight="700" fill="#fff">lawmitran<tspan fill="#C9A24B">.</tspan></text>
  </g>

  <!-- ============ C: Pillars (LM with column M) ============ -->
  <g>
    <rect x="40" y="360" width="440" height="220" rx="16" fill="#fff" stroke="#e6e9f0"/>
    <text x="60" y="388" font-size="12" font-weight="700" fill="#C9A24B" letter-spacing="2">CONCEPT C · PILLARS</text>
    <g transform="translate(108,408)">
      <!-- L -->
      <path d="M6 6 V92 H46" stroke="#0B192C" stroke-width="14" fill="none" stroke-linecap="square"/>
      <!-- M as two columns + base -->
      <rect x="52" y="20" width="9" height="62" fill="#C9A24B"/>
      <rect x="86" y="20" width="9" height="62" fill="#C9A24B"/>
      <path d="M61 20 L73 44 L85 20" stroke="#C9A24B" stroke-width="9" fill="none" stroke-linejoin="round"/>
      <rect x="46" y="14" width="55" height="7" rx="2" fill="#0B192C"/>
      <rect x="46" y="84" width="55" height="7" rx="2" fill="#0B192C"/>
    </g>
    <text x="230" y="482" font-size="34" font-weight="800" fill="#0B192C" letter-spacing="-1">Law<tspan fill="#C9A24B">Mitran</tspan></text>
    <text x="231" y="508" font-size="11" font-weight="700" letter-spacing="3" fill="#C9A24B">JUSTICE, MADE ACCESSIBLE.</text>
    <rect x="230" y="528" width="240" height="40" rx="8" fill="#0B192C"/>
    <text x="250" y="553" font-size="20" font-weight="800" fill="#fff">Law<tspan fill="#C9A24B">Mitran</tspan></text>
  </g>

  <!-- ============ D: Locator (pin + scale → find lawyers near you) ============ -->
  <g>
    <rect x="520" y="360" width="440" height="220" rx="16" fill="#fff" stroke="#e6e9f0"/>
    <text x="540" y="388" font-size="12" font-weight="700" fill="#C9A24B" letter-spacing="2">CONCEPT D · LOCATOR</text>
    <g transform="translate(560,402)">
      <!-- pin -->
      <path d="M44 4 C68 4 86 22 86 46 C86 78 44 108 44 108 C44 108 2 78 2 46 C2 22 20 4 44 4 Z" fill="#0B192C"/>
      <circle cx="44" cy="44" r="30" fill="#fff"/>
      <!-- mini scale inside -->
      <path d="M30 40 H58" stroke="#0B192C" stroke-width="2.2" stroke-linecap="round"/>
      <path d="M44 30 V54" stroke="#0B192C" stroke-width="2.2" stroke-linecap="round"/>
      <path d="M30 40 l-5 9 h10 z" fill="#C9A24B"/><path d="M58 40 l-5 9 h10 z" fill="#C9A24B"/>
      <rect x="36" y="54" width="16" height="2.6" rx="1.3" fill="#0B192C"/>
      <circle cx="44" cy="29" r="2.4" fill="#C9A24B"/>
    </g>
    <text x="665" y="482" font-size="34" font-weight="800" fill="#0B192C" letter-spacing="-1">Law<tspan fill="#C9A24B">Mitran</tspan></text>
    <text x="666" y="508" font-size="11" font-weight="700" letter-spacing="3" fill="#C9A24B">FIND TRUSTED LAWYERS NEAR YOU</text>
    <rect x="665" y="528" width="240" height="40" rx="8" fill="#0B192C"/>
    <text x="685" y="553" font-size="20" font-weight="800" fill="#fff">Law<tspan fill="#C9A24B">Mitran</tspan></text>
  </g>

  <!-- ============ E: App icon variants (square marks) ============ -->
  <text x="60" y="640" font-size="12" font-weight="700" fill="#C9A24B" letter-spacing="2">APP / FAVICON MARKS</text>
  <g transform="translate(60,660)">
    <!-- A mark -->
    <rect x="0" y="0" width="92" height="92" rx="20" fill="#0B192C"/>
    <path d="M46 18 V74 M28 34 H64" stroke="#fff" stroke-width="3" stroke-linecap="round"/>
    <path d="M28 34 l-8 15 h16 z" fill="#C9A24B"/><path d="M64 34 l-8 15 h16 z" fill="#C9A24B"/>
    <rect x="34" y="74" width="24" height="4" rx="2" fill="#fff"/>
    <!-- B mark -->
    <g transform="translate(116,0)">
      <rect x="0" y="0" width="92" height="92" rx="20" fill="#C9A24B"/>
      <text x="46" y="62" text-anchor="middle" font-family="Georgia,serif" font-weight="700" font-size="46" fill="#0B192C">LM</text>
    </g>
    <!-- C mark -->
    <g transform="translate(232,0)">
      <rect x="0" y="0" width="92" height="92" rx="20" fill="#fff" stroke="#e6e9f0"/>
      <text x="46" y="60" text-anchor="middle" font-family="Georgia,serif" font-weight="700" font-size="44"><tspan fill="#0B192C">L</tspan><tspan fill="#C9A24B">M</tspan></text>
    </g>
    <!-- D mark: pin -->
    <g transform="translate(348,0)">
      <rect x="0" y="0" width="92" height="92" rx="20" fill="#0B192C"/>
      <path d="M46 20 C62 20 74 32 74 48 C74 70 46 90 46 90 C46 90 18 70 18 48 C18 32 30 20 46 20 Z" fill="#C9A24B"/>
      <circle cx="46" cy="46" r="14" fill="#0B192C"/>
    </g>
  </g>

  <!-- recommendation -->
  <g transform="translate(60,790)">
    <rect x="0" y="0" width="880" height="270" rx="16" fill="#fff" stroke="#e6e9f0"/>
    <text x="28" y="40" font-size="16" font-weight="800" fill="#0B192C">Quick take</text>
    <text x="28" y="74" font-size="14" fill="#334155"><tspan font-weight="700" fill="#0B192C">A · Aegis</tspan> — shield = trust/protection. Most "legal &amp; safe" feel. Great for a trust-first marketplace.</text>
    <text x="28" y="104" font-size="14" fill="#334155"><tspan font-weight="700" fill="#0B192C">B · Equilibrium</tspan> — cleanest, most modern/tech. Lowercase wordmark scales best on mobile &amp; favicons.</text>
    <text x="28" y="134" font-size="14" fill="#334155"><tspan font-weight="700" fill="#0B192C">C · Pillars</tspan> — keeps your current LM monogram idea, more refined (columns = law/courts).</text>
    <text x="28" y="164" font-size="14" fill="#334155"><tspan font-weight="700" fill="#0B192C">D · Locator</tspan> — pin + scale signals "find verified lawyers near you" (matches your map feature).</text>
    <text x="28" y="206" font-size="14" font-weight="700" fill="#0B192C">My pick: B (Equilibrium) for a clean tech-marketplace brand, or A (Aegis) if you want maximum "trust".</text>
    <text x="28" y="232" font-size="13" fill="#64748b">Tell me a letter (A/B/C/D) and I'll produce the final logo.svg + logo-light.svg and wire it across every page.</text>
  </g>
</svg>

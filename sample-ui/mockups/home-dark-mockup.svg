      <circle cx="33" cy="5" r="3" fill="#fff"/>
      <path d="M13 14 H53" stroke="#fff" stroke-width="2.6" stroke-linecap="round"/>
      <circle cx="13" cy="14" r="2.1" fill="#fff"/><circle cx="53" cy="14" r="2.1" fill="#fff"/>
      <path d="M13 14 L6.5 27 H19.5 Z" fill="#C9A24B"/>
      <path d="M53 14 L46.5 27 H59.5 Z" fill="#C9A24B"/>

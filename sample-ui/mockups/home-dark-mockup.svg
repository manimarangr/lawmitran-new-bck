  <text x="720" y="328" text-anchor="middle" font-size="56" font-weight="800" fill="#C9A24B" letter-spacing="-1">Start here.</text>
  <text x="720" y="372" text-anchor="middle" font-size="19" fill="#aab6d4">Tell us what you need — we match you with verified lawyers near you, and they reach out directly.</text>


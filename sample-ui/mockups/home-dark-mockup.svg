<svg viewBox="0 0 1440 1040" xmlns="http://www.w3.org/2000/svg" font-family="'Segoe UI',Arial,sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#0c1c3e"/>
      <stop offset="0.45" stop-color="#0a1838"/>
      <stop offset="1" stop-color="#081330"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.85" cy="0" r="0.6">
      <stop offset="0" stop-color="#c9a24b" stop-opacity="0.22"/>
      <stop offset="1" stop-color="#c9a24b" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="card" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#14274e"/>
      <stop offset="1" stop-color="#0e2148"/>
    </linearGradient>
  </defs>

  <!-- page bg -->

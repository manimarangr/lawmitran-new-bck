<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Notifications | Lawmitran</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap');
    body { font-family: 'Inter', sans-serif; }
    .hero-gradient { background: linear-gradient(135deg, #0B192C 0%, #1E3E62 100%); }
  </style>
</head>
<body class="bg-gray-50 text-slate-800">

  <!-- ===== NAV ===== -->
  <nav class="bg-white border-b border-gray-100 sticky top-0 z-40 shadow-sm">
    <div class="max-w-3xl mx-auto px-4 sm:px-6 lg:px-8 h-16 flex items-center justify-between">
      <a href="index.html" class="flex items-center space-x-3"><img src="assets/logo.svg" alt="LawMitran" style="height:32px;display:block" /></a>
      <div class="flex items-center gap-5 text-sm font-medium">
        <a href="lawyer-dashboard.html" class="text-slate-600 hover:text-[#0B192C]">Dashboard</a>
        <a href="notifications.html" class="text-[#0B192C] font-bold relative"><i class="fa-regular fa-bell"></i></a>
        <a href="settings.html" class="text-slate-600 hover:text-[#0B192C]">Settings</a>
      </div>
    </div>
  </nav>

  <main class="max-w-2xl mx-auto px-6 py-8">
    <div class="flex items-center justify-between mb-5">
      <div>
        <h1 class="text-2xl font-extrabold text-[#0B192C]">Notifications</h1>
        <p class="text-sm text-slate-500 mt-1"><span id="unread">0</span> unread</p>
      </div>
      <button onclick="markAll()" class="text-sm font-semibold text-[#C9A24B] hover:underline">Mark all read</button>
    </div>

    <div id="list" class="space-y-2"></div>
    <p class="text-center text-[11px] text-slate-400 italic mt-6">Wired to <code>GET /api/users/me/notifications</code> · <code>PATCH /api/users/me/notifications/:id/read</code>.</p>
  </main>

  <script>
    // types cover subscription + client↔lawyer communication
    const META = {
      LEAD_NEW:        { icon:'fa-inbox',            color:'text-blue-600 bg-blue-50' },
      LEAD_CONTACTED:  { icon:'fa-phone-volume',     color:'text-amber-600 bg-amber-50' },
      LEAD_CONFIRMED:  { icon:'fa-circle-check',     color:'text-green-600 bg-green-50' },
      SUB_REMINDER:    { icon:'fa-clock',            color:'text-amber-600 bg-amber-50' },
      SUB_EXPIRED:     { icon:'fa-triangle-exclamation', color:'text-rose-600 bg-rose-50' },
      SUB_ACTIVE:      { icon:'fa-crown',            color:'text-green-600 bg-green-50' },
      REPORT_UPDATE:   { icon:'fa-flag',             color:'text-slate-600 bg-slate-100' }
    };
    let items = [
      { id:'n1', type:'SUB_REMINDER', title:'Your subscription ends in 15 days', body:'Renew your Basic plan to keep receiving leads.', ago:'2h ago', read:false, link:'lawyer-plan.html' },
      { id:'n2', type:'LEAD_NEW', title:'New Family Law lead', body:'A client in Bengaluru is looking for help. Open your inbox to respond.', ago:'5h ago', read:false, link:'lawyer-dashboard.html' },
      { id:'n3', type:'LEAD_CONFIRMED', title:'Client confirmed your contact', body:'Rohit K. confirmed you reached out. Nice work!', ago:'1d ago', read:false, link:'lawyer-dashboard.html' },
      { id:'n4', type:'SUB_ACTIVE', title:'Payment received — Premium active', body:'Your Premium plan is active until 12 Aug 2026. GST invoice sent to your email.', ago:'3d ago', read:true, link:'lawyer-plan.html' },
      { id:'n5', type:'REPORT_UPDATE', title:'Your report was reviewed', body:'Thanks — our team reviewed your report and took appropriate action.', ago:'5d ago', read:true, link:'#' }
    ];

    function render(){
      document.getElementById('list').innerHTML = items.map(n => {
        const m = META[n.type] || { icon:'fa-bell', color:'text-slate-600 bg-slate-100' };
        return `<a href="${n.link}" onclick="markRead('${n.id}')" class="flex gap-3 p-4 rounded-2xl border ${n.read?'border-gray-200/60 bg-white':'border-[#C9A24B]/40 bg-[#fffdf7]'} shadow-sm hover:shadow-md transition">
          <span class="w-10 h-10 rounded-xl ${m.color} flex items-center justify-center shrink-0"><i class="fa-solid ${m.icon}"></i></span>
          <div class="flex-1 min-w-0">
            <div class="flex items-center gap-2">
              <p class="font-bold text-slate-900 text-sm">${n.title}</p>
              ${n.read?'':'<span class="w-2 h-2 rounded-full bg-[#C9A24B] shrink-0"></span>'}
            </div>
            <p class="text-sm text-slate-500 mt-0.5">${n.body}</p>
            <p class="text-[11px] text-slate-400 mt-1">${n.ago}</p>
          </div>
        </a>`;
      }).join('') || '<div class="text-center text-sm text-slate-400 py-16"><i class="fa-regular fa-bell-slash text-2xl block mb-2"></i> No notifications yet.</div>';
      document.getElementById('unread').textContent = items.filter(n=>!n.read).length;
    }
    function markRead(id){ const n=items.find(x=>x.id===id); if(n) n.read=true; setTimeout(render, 50); }
    function markAll(){ items.forEach(n=>n.read=true); render(); }
    render();
  </script>
</body>
</html>

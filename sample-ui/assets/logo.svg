<svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" viewBox="60 60 880 880" role="img" aria-label="LawMitran — Legal Help, Simplified.">
  <!-- Wrapper: displays the original logo.png unchanged. Place your file at assets/logo.png
       viewBox trims ~6% whitespace margin so the artwork reads larger in slim navbars.
       If the crop clips your logo, widen it back toward "0 0 1000 1000". -->
  <image href="logo.png" xlink:href="logo.png" x="0" y="0" width="1000" height="1000" preserveAspectRatio="xMidYMid meet"/>
</svg>
